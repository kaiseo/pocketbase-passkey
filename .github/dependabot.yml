version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
    groups:
      pocketbase:
        patterns:
          - "github.com/pocketbase/*"

  - package-ecosystem: "npm"
    directory: "/sdk"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
