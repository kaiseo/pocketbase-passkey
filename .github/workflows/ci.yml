name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-server:
        name: Build Go Server
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.22"
            - name: Build
              run: |
                  cd server
                  go build -v ./...

    build-sdk:
        name: Build SDK
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: sdk/package-lock.json
            - name: Install dependencies
              run: |
                  cd sdk
                  npm install
            - name: Build
              run: |
                  cd sdk
                  npm run build
