services:
  pocketbase:
    image: kaiseo/pocketbase-passkey:latest
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/app/pb_data
    environment:
      - PASSKEY_RPID=example.com
      - PASSKEY_RP_DISPLAY_NAME=My App
      - PASSKEY_RP_ORIGINS=https://example.com
    restart: unless-stopped
